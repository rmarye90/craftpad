name: Deploy to Curse

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Curse to generate your changelog

      - name: Pack and Ship to Curse
        uses: BigWigsMods/packager@master
        env:
          CF_API_KEY: ${{ secrets.CF_API_TOKEN }}
          CURSE_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
